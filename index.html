<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Titolo e Logo -->
    <header>
        <div class="header">
            <img class="logo" src="logo.png" alt="logo">
            <h1 class="text-logo">Toboolist</h1>
        </div>
    </header>
    <!-- Contenitore Bianco -->
    <div class="container">
        <div class="bar">
            <div class="bottoni">
                <span class="add-task">Add Task</span>
                <span class="add-section">Add Section</span>
             </div>
             <!-- Sezioni -->
             <section>
                <div class="new-task">
                    <h3>&dtrif; New Task</h3>
                    <ul>
                        <li> <span class="check">&check;</span>
                       Quarterly Newsletter <span class="bottom-editorial">
                       Editorial</span> </li>
                    </ul>
                </div>        
             </section>
             <section>
                 <div class="today">
                    <h3>&dtrif; Today</h3>
                    <ul>
                        <li><span class="check">&check;</span>
                        Recruiting blog post <span class="bottom-editorial">
                            Editorial</span></li>
                        <li><span class="check">&check;</span>
                        Mobile app luaunch <span class="bottom goals">Q1 Goals</span></li>
                        <li><span class="cross">&cross;</span>Interview
                        John H <span class="bottom recruiting">Recruiting</span></li>
                        <li><span class="check">&check;</span>
                        Summit update to mobile storefronts <span class="bottom mobile">Mobile</span></li>
                    </ul>
                 </div>
             </section>
             <section>
                 <div class="upcoming">
                    <h3>&dtrif; Up Coming</h3>
                    <ul>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        
                    </ul>


                 </div>
             </section>
        </div>
    </div>
    
</body>
</html>
